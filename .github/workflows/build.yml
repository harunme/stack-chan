name: Build Stack-chan Firmware

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/actions/setup/action.yml'
      - '.github/workflows/build.yml'
      - 'lefthook.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/actions/setup/action.yml'
      - '.github/workflows/build.yml'
      - 'lefthook.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Check format
        working-directory: ./firmware
        run: npm run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Lint firmware
        working-directory: ./firmware
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run firmware tests
        working-directory: ./firmware
        run: npm run test

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32/m5stack
          - esp32/m5stack_cores3
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Pin Moddable SDK
        run: |
          git -C "$HOME/.local/share/moddable" fetch origin b0411457e4577ea5560c780cb7824f3b00c2b2af
          git -C "$HOME/.local/share/moddable" checkout --detach FETCH_HEAD
      - name: Build firmware
        working-directory: ./firmware
        run: source "$HOME/.local/share/xs-dev-export.sh" && npm run build --target=${{ matrix.target }}
