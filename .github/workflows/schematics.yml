name: Generate Stack-chan Schematics Files

on:
  push:
    branches:
      - dev/v1.0
    paths:
      - '**.kicad_sch'
      - '**.kicad_pcb'
      - '.github/workflows/schematics.yml'
  pull_request:
    branches:
      - dev/v1.0
    paths:
      - '**.kicad_sch'
      - '**.kicad_pcb'
      - '.github/workflows/schematics.yml'

permissions:
  contents: read

concurrency:
  group: schematics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-schematics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: INTI-CMNB/KiBot@v2_k7
        with:
          config: schematics/m5-pantilt/m5-pantilt.kibot.yaml
          schema: schematics/m5-pantilt/m5-pantilt.kicad_sch
          board: schematics/m5-pantilt/m5-pantilt.kicad_pcb
          dir: generated
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: schematics-files
          path: generated

  deploy-schematics:
    needs: build-schematics
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev/v1.0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Download schematics files
        uses: actions/download-artifact@v4
        with:
          name: schematics-files
          path: ./schematics-files
      - name: Update schematics files
        run: |
          mkdir -p ./web/schematics
          rm -rf ./web/schematics/*
          cp -R ./schematics-files/. ./web/schematics/
      - name: Commit schematics update
        run: |
          git config user.name 'GitHub Action'
          git config user.email 'action@github.com'
          git add ./web/schematics
          if git diff --cached --quiet; then
            echo "No schematics changes to deploy"
            exit 0
          fi
          git commit -m "Deploy schematics files from ${{ github.sha }}"
          git push origin HEAD:gh-pages
